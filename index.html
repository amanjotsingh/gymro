<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymPro — Trainer Management</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f4;
      --bg-tertiary: #f0efed;
      --bg-info: #e6f1fb;
      --bg-success: #eaf3de;
      --bg-warning: #faeeda;
      --bg-danger: #fcebeb;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-info: #185fa5;
      --text-success: #3b6d11;
      --text-warning: #854f0b;
      --text-danger: #a32d2d;
      --border: rgba(0,0,0,0.12);
      --border-med: rgba(0,0,0,0.2);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1a;
        --bg-secondary: #252523;
        --bg-tertiary: #2a2a28;
        --bg-info: #0c2d4a;
        --bg-success: #122609;
        --bg-warning: #3a2204;
        --bg-danger: #3a0d0d;
        --text-primary: #e8e8e4;
        --text-secondary: #9a9a94;
        --text-info: #7ab8f5;
        --text-success: #90c95a;
        --text-warning: #f0a840;
        --text-danger: #f09090;
        --border: rgba(255,255,255,0.1);
        --border-med: rgba(255,255,255,0.18);
      }
    }
    body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }
    #app { min-height: 100vh; }

    /* Layout */
    .app-shell { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; min-width: 220px; background: var(--bg-primary); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 40; }
    .sidebar-logo { padding: 20px 16px 14px; border-bottom: 0.5px solid var(--border); }
    .sidebar-logo h1 { font-size: 18px; font-weight: 600; color: var(--text-primary); }
    .sidebar-logo span { font-size: 11px; color: var(--text-secondary); }
    .section-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .07em; padding: 12px 16px 4px; }
    .sidebar-nav { padding: 8px 0; flex: 1; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; font-size: 13px; color: var(--text-secondary); border-left: 3px solid transparent; transition: all .12s; }
    .nav-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .nav-item.active { background: var(--bg-info); color: var(--text-info); border-left-color: #185fa5; }
    .nav-badge { margin-left: auto; background: var(--bg-warning); color: var(--text-warning); border-radius: 10px; font-size: 10px; padding: 1px 6px; font-weight: 600; }
    .sidebar-footer { padding: 8px 0; border-top: 0.5px solid var(--border); }
    .logout-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; cursor: pointer; font-size: 12px; color: var(--text-secondary); transition: all .12s; }
    .logout-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .main-wrap { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .storage-bar { display: flex; align-items: center; gap: 8px; padding: 7px 24px; background: var(--bg-primary); border-bottom: 0.5px solid var(--border); font-size: 11px; color: var(--text-secondary); position: sticky; top: 0; z-index: 30; }
    .storage-dot { width: 7px; height: 7px; border-radius: 50%; background: #3b6d11; flex-shrink: 0; }
    .main { padding: 24px; flex: 1; }

    /* Login */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-tertiary); }
    .login-card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 36px; width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { font-size: 28px; font-weight: 700; color: var(--text-primary); letter-spacing: -.5px; }
    .login-logo p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .login-hint { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 12px; font-size: 12px; color: var(--text-secondary); margin-bottom: 18px; line-height: 1.6; }
    .login-err { background: var(--bg-danger); color: var(--text-danger); border-radius: var(--radius-md); padding: 8px 12px; font-size: 12px; margin-bottom: 12px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: var(--radius-md); font-size: 13px; cursor: pointer; border: 0.5px solid var(--border-med); background: var(--bg-primary); color: var(--text-primary); transition: all .12s; text-decoration: none; font-family: var(--font); }
    .btn:hover { background: var(--bg-secondary); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--bg-info); color: var(--text-info); border-color: #185fa5; }
    .btn-primary:hover { opacity: .88; }
    .btn-sm { padding: 4px 9px; font-size: 11px; }
    .btn-green { background: var(--bg-success); color: var(--text-success); border-color: #c0dd97; }
    .btn-green:hover { background: #c0dd97; }
    .btn-pdf { background: #eeedfe; color: #534ab7; border-color: #cecbf6; }
    .btn-pdf:hover { background: #cecbf6; }
    .btn-danger { background: var(--bg-danger); color: var(--text-danger); border-color: #f7c1c1; }
    .btn-danger:hover { background: #f7c1c1; }

    /* Forms */
    .form-group { margin-bottom: 13px; }
    .form-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; display: block; font-weight: 500; }
    .form-input { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border-med); border-radius: var(--radius-md); font-size: 13px; color: var(--text-primary); background: var(--bg-primary); font-family: var(--font); transition: border-color .12s; }
    .form-input:focus { outline: none; border-color: #185fa5; box-shadow: 0 0 0 3px rgba(24,95,165,.12); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

    /* Cards */
    .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; }
    .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 16px; }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
    .stat-value { font-size: 22px; font-weight: 600; color: var(--text-primary); }
    .stat-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: var(--radius-md); font-size: 10px; white-space: nowrap; font-weight: 500; }
    .badge-confirmed { background: var(--bg-success); color: var(--text-success); }
    .badge-pending { background: var(--bg-warning); color: var(--text-warning); }
    .badge-cancelled { background: var(--bg-danger); color: var(--text-danger); }
    .badge-change { background: var(--bg-info); color: var(--text-info); }
    .badge-paid { background: var(--bg-success); color: var(--text-success); }
    .badge-overdue { background: var(--bg-danger); color: var(--text-danger); }
    .badge-partial { background: #eeedfe; color: #534ab7; }

    /* Avatars */
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .av-blue  { background: #e6f1fb; color: #185fa5; }
    .av-teal  { background: #e1f5ee; color: #0f6e56; }
    .av-purple{ background: #eeedfe; color: #534ab7; }
    .av-coral { background: #faece7; color: #993c1d; }
    .av-amber { background: #faeeda; color: #854f0b; }

    /* Lists */
    .appt-list { display: flex; flex-direction: column; gap: 7px; }
    .appt-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg-primary); transition: background .1s; }
    .appt-row:hover { background: var(--bg-secondary); }
    .pay-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg-primary); transition: background .1s; }
    .pay-row:hover { background: var(--bg-secondary); }
    .pay-amount { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .pay-meta { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

    /* Tabs */
    .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 16px; }
    .tab { padding: 8px 14px; font-size: 13px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .12s; }
    .tab.active { color: var(--text-info); border-bottom-color: #185fa5; font-weight: 600; }

    /* Page header */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .page-title { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    .page-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* Clients */
    .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 12px; }
    .client-card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; cursor: pointer; transition: all .12s; }
    .client-card:hover { border-color: var(--border-med); background: var(--bg-secondary); }
    .goal-tag { display: inline-flex; padding: 3px 8px; background: var(--bg-info); color: var(--text-info); border-radius: var(--radius-md); font-size: 11px; margin-top: 6px; }
    .metric-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
    .detail-panel { display: grid; grid-template-columns: 1fr 2fr; gap: 18px; }

    /* Groups */
    .group-card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; }
    .info-banner { background: var(--bg-info); color: var(--text-info); border-radius: var(--radius-md); padding: 8px 12px; font-size: 12px; margin-bottom: 12px; line-height: 1.5; }
    .wa-btn { display: inline-flex; align-items: center; gap: 5px; padding: 4px 9px; background: var(--bg-success); color: var(--text-success); border: 0.5px solid #c0dd97; border-radius: var(--radius-md); font-size: 11px; cursor: pointer; text-decoration: none; font-family: var(--font); }
    .wa-btn:hover { background: #c0dd97; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
    .modal { background: var(--bg-primary); border-radius: var(--radius-lg); padding: 22px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; border: 0.5px solid var(--border); }
    .modal-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; }

    /* Toast */
    .save-toast { position: fixed; bottom: 24px; right: 20px; background: var(--bg-success); color: var(--text-success); border: 0.5px solid #c0dd97; border-radius: var(--radius-md); padding: 9px 16px; font-size: 12px; z-index: 300; font-weight: 500; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

    /* Empty state */
    .empty-state { text-align: center; padding: 32px; color: var(--text-secondary); font-size: 13px; }

    /* Mobile nav */
    .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-primary); border-top: 0.5px solid var(--border); padding: 6px 0; z-index: 50; }
    .mob-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 5px 4px; cursor: pointer; font-size: 9px; color: var(--text-secondary); }
    .mob-item.active { color: var(--text-info); }
    .mob-icon { font-size: 18px; }

    @media (max-width: 680px) {
      .sidebar { display: none; }
      .main-wrap { margin-left: 0; }
      .mobile-nav { display: flex; }
      .main { padding: 14px; padding-bottom: 74px; }
      .stat-grid { grid-template-columns: repeat(2,1fr); }
      .detail-panel { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .client-grid { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; align-items: flex-start; }
      .storage-bar span:last-child { display: none; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const {useState, useEffect, useCallback, useRef} = React;

const AV_COLORS = ['av-blue','av-teal','av-purple','av-coral','av-amber'];
const getAv = (name, i) => ({
  c: AV_COLORS[(i||0) % AV_COLORS.length],
  init: name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()
});
const fmt = d => d instanceof Date ? d.toISOString().split('T')[0] : d;
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const today = new Date();
const fmtDate = d => new Date(d+'T00:00').toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
const fmtMoney = n => '$'+parseFloat(n).toFixed(2);

const LS = { clients:'gymro_clients', appts:'gymro_appts', groups:'gymro_groups', payments:'gymro_payments' };

const INIT_CLIENTS = [
  {id:1,name:'Sarah Mitchell',phone:'14165550101',email:'sarah@email.com',age:28,weight:65,height:168,goal:'Weight Loss',notes:'Knee injury — avoid high impact',joinDate:'2025-01-10',changeReq:null},
  {id:2,name:'James Okafor',phone:'14165550202',email:'james@email.com',age:34,weight:88,height:180,goal:'Muscle Gain',notes:'Intermediate lifter',joinDate:'2025-02-03',changeReq:null},
  {id:3,name:'Priya Sharma',phone:'14165550303',email:'priya@email.com',age:25,weight:57,height:162,goal:'Endurance',notes:'Training for 10K run',joinDate:'2025-03-01',changeReq:'Would like to move Wednesday session to Thursday 7am'},
  {id:4,name:'Chris Lee',phone:'14165550404',email:'chris@email.com',age:42,weight:79,height:175,goal:'General Fitness',notes:'Busy schedule — mornings preferred',joinDate:'2025-01-22',changeReq:null},
  {id:5,name:'Amara Nwosu',phone:'14165550505',email:'amara@email.com',age:31,weight:70,height:170,goal:'Flexibility',notes:'Yoga background',joinDate:'2025-02-18',changeReq:null},
];
const INIT_APPTS = [
  {id:1,clientId:1,date:fmt(today),time:'07:00',type:'Strength',status:'confirmed',notes:'Upper body focus'},
  {id:2,clientId:2,date:fmt(today),time:'09:00',type:'Strength',status:'confirmed',notes:''},
  {id:3,clientId:3,date:fmt(today),time:'10:30',type:'Cardio',status:'change-requested',notes:'Client requested change'},
  {id:4,clientId:4,date:fmt(addDays(today,1)),time:'07:00',type:'General Fitness',status:'pending',notes:''},
  {id:5,clientId:5,date:fmt(addDays(today,1)),time:'08:30',type:'Flexibility',status:'confirmed',notes:''},
  {id:6,clientId:1,date:fmt(addDays(today,2)),time:'07:00',type:'Cardio',status:'confirmed',notes:''},
  {id:7,clientId:2,date:fmt(addDays(today,3)),time:'09:00',type:'Strength',status:'pending',notes:''},
];
const INIT_GROUPS = [
  {id:1,name:'Morning Crew',clientIds:[1,2,4],description:'6–10am sessions'},
  {id:2,name:'Weight Loss Group',clientIds:[1,5],description:'Fat loss focused clients'},
];
const INIT_PAYMENTS = [
  {id:1,clientId:1,amount:200,date:fmt(addDays(today,-5)),desc:'Monthly package — April',status:'paid'},
  {id:2,clientId:2,amount:200,date:fmt(addDays(today,-3)),desc:'Monthly package — April',status:'paid'},
  {id:3,clientId:3,amount:200,date:fmt(addDays(today,-1)),desc:'Monthly package — April',status:'pending'},
  {id:4,clientId:4,amount:150,date:fmt(addDays(today,-10)),desc:'10-session pack',status:'overdue'},
  {id:5,clientId:5,amount:200,date:fmt(addDays(today,5)),desc:'Monthly package — April',status:'pending'},
];

const loadLS = (key, fallback) => { try { const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; } catch { return fallback; } };

function usePersistedState(key, init) {
  const [state, setState] = useState(() => loadLS(key, init));
  const first = useRef(true);
  useEffect(() => {
    if (first.current) { first.current=false; return; }
    try { localStorage.setItem(key, JSON.stringify(state)); } catch {}
  }, [state, key]);
  return [state, setState];
}

/* ─── APP ──────────────────────────────────────────────── */
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [view, setView] = useState('dashboard');
  const [clients,  setClients]  = usePersistedState(LS.clients,  INIT_CLIENTS);
  const [appts,    setAppts]    = usePersistedState(LS.appts,    INIT_APPTS);
  const [groups,   setGroups]   = usePersistedState(LS.groups,   INIT_GROUPS);
  const [payments, setPayments] = usePersistedState(LS.payments, INIT_PAYMENTS);
  const [modal, setModal] = useState(null);
  const [selClient, setSelClient] = useState(null);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  const showToast = useCallback(msg => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2200);
  }, []);

  const ws = (setter, label) => (...args) => { setter(...args); showToast(label+' saved'); };

  if (!loggedIn) return React.createElement(LoginScreen, {onLogin: () => setLoggedIn(true)});

  const todayAppts   = appts.filter(a => a.date===fmt(today)).sort((a,b)=>a.time.localeCompare(b.time));
  const upcomingAppts = appts.filter(a => a.date>fmt(today)).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const changeReqs   = clients.filter(c => c.changeReq);
  const getClient    = id => clients.find(c => c.id===id);
  const pendingPayCount = payments.filter(p => p.status==='pending'||p.status==='overdue').length;

  const handleReset = () => {
    if (!confirm('Reset ALL data to demo defaults? This cannot be undone.')) return;
    Object.values(LS).forEach(k => localStorage.removeItem(k));
    setClients(INIT_CLIENTS); setAppts(INIT_APPTS);
    setGroups(INIT_GROUPS);   setPayments(INIT_PAYMENTS);
    showToast('Reset to demo data');
  };

  const e = React.createElement;
  return e('div', {className:'app-shell'},
    e(Sidebar, {view,setView,changeReqs,pendingPayCount,onLogout:()=>setLoggedIn(false),onReset:handleReset}),
    e('div', {className:'main-wrap'},
      e(StorageBar, {clients,appts,payments,groups}),
      e('div', {className:'main'},
        view==='dashboard'   && e(Dashboard,    {todayAppts,upcomingAppts,clients,changeReqs,payments,getClient,setView,setModal,setClients:ws(setClients,'Change request'),appts}),
        view==='appointments'&& e(Appointments, {appts,setAppts:ws(setAppts,'Appointment'),clients,getClient,setModal}),
        view==='clients'     && e(Clients,      {clients,setClients:ws(setClients,'Client'),selClient,setSelClient,appts,payments,setPayments:ws(setPayments,'Payment')}),
        view==='groups'      && e(Groups,       {groups,setGroups:ws(setGroups,'Group'),clients}),
        view==='payments'    && e(Payments,     {payments,setPayments:ws(setPayments,'Payment'),clients,getClient}),
      )
    ),
    modal && e(ModalRouter, {modal,setModal,clients,setClients:ws(setClients,'Client'),appts,setAppts:ws(setAppts,'Appointment'),getClient}),
    toast && e('div', {className:'save-toast'}, '✓ '+toast),
    e(MobileNav, {view, setView, pendingPayCount})
  );
}

/* ─── STORAGE BAR ───────────────────────────────────────── */
function StorageBar({clients,appts,payments,groups}) {
  const kb = (JSON.stringify({clients,appts,payments,groups}).length/1024).toFixed(1);
  const t  = new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  return React.createElement('div',{className:'storage-bar'},
    React.createElement('div',{className:'storage-dot'}),
    'Saved to localStorage · '+kb+' KB · last saved '+t,
    React.createElement('span',{style:{marginLeft:'auto',fontSize:10,opacity:.55}},'Data persists on this device across reloads')
  );
}

/* ─── LOGIN ─────────────────────────────────────────────── */
function LoginScreen({onLogin}) {
  const [user,setUser]=useState(''); const [pass,setPass]=useState(''); const [err,setErr]=useState('');
  const login = () => { if(user==='trainer'&&pass==='gym123') onLogin(); else setErr('Invalid username or password.'); };
  const e = React.createElement;
  return e('div',{className:'login-wrap'},
    e('div',{className:'login-card'},
      e('div',{className:'login-logo'}, e('h1',null,'GymPro'), e('p',null,'Trainer Management Portal')),
      e('div',{className:'login-hint'},'Demo credentials — username: trainer · password: gym123'),
      err && e('div',{className:'login-err'},err),
      e('div',{className:'form-group'}, e('label',{className:'form-label'},'Username'), e('input',{className:'form-input',value:user,onChange:ev=>setUser(ev.target.value),onKeyDown:ev=>ev.key==='Enter'&&login()})),
      e('div',{className:'form-group'}, e('label',{className:'form-label'},'Password'), e('input',{className:'form-input',type:'password',value:pass,onChange:ev=>setPass(ev.target.value),onKeyDown:ev=>ev.key==='Enter'&&login()})),
