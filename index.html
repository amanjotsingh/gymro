<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymPro — Bootcamp Trainer</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #f0efed;
      --bg-info: #e6f1fb; --bg-success: #eaf3de; --bg-warning: #faeeda; --bg-danger: #fcebeb;
      --text-primary: #1a1a18; --text-secondary: #6b6b67;
      --text-info: #185fa5; --text-success: #3b6d11; --text-warning: #854f0b; --text-danger: #a32d2d;
      --border: rgba(0,0,0,0.12); --border-med: rgba(0,0,0,0.22);
      --radius-md: 8px; --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary:#1c1c1a; --bg-secondary:#252523; --bg-tertiary:#2a2a28;
        --bg-info:#0c2d4a; --bg-success:#122609; --bg-warning:#3a2204; --bg-danger:#3a0d0d;
        --text-primary:#e8e8e4; --text-secondary:#9a9a94;
        --text-info:#7ab8f5; --text-success:#90c95a; --text-warning:#f0a840; --text-danger:#f09090;
        --border:rgba(255,255,255,0.1); --border-med:rgba(255,255,255,0.2);
      }
    }
    body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }
    #app { min-height: 100vh; }

    /* Layout */
    .app-shell { display: flex; min-height: 100vh; }
    .sidebar { width: 215px; min-width: 215px; background: var(--bg-primary); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 40; }
    .sidebar-logo { padding: 20px 16px 14px; border-bottom: 0.5px solid var(--border); }
    .sidebar-logo h1 { font-size: 18px; font-weight: 600; color: var(--text-primary); }
    .sidebar-logo span { font-size: 11px; color: var(--text-secondary); }
    .sec-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .07em; padding: 12px 16px 4px; }
    .sidebar-nav { padding: 8px 0; flex: 1; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; font-size: 13px; color: var(--text-secondary); border-left: 3px solid transparent; transition: all .12s; }
    .nav-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .nav-item.active { background: var(--bg-info); color: var(--text-info); border-left-color: #185fa5; }
    .nav-badge { margin-left: auto; background: var(--bg-warning); color: var(--text-warning); border-radius: 10px; font-size: 10px; padding: 1px 6px; font-weight: 600; }
    .sidebar-footer { border-top: 0.5px solid var(--border); padding: 6px 0; }
    .logout-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; cursor: pointer; font-size: 12px; color: var(--text-secondary); }
    .logout-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .main-wrap { margin-left: 215px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .storage-bar { display: flex; align-items: center; gap: 8px; padding: 6px 24px; background: var(--bg-primary); border-bottom: 0.5px solid var(--border); font-size: 11px; color: var(--text-secondary); position: sticky; top: 0; z-index: 30; }
    .storage-dot { width: 7px; height: 7px; border-radius: 50%; background: #3b6d11; flex-shrink: 0; }
    .main { padding: 22px 24px; flex: 1; }

    /* Login */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-tertiary); }
    .login-card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 36px; width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 26px; }
    .login-logo h1 { font-size: 28px; font-weight: 700; color: var(--text-primary); }
    .login-logo p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .login-hint { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 12px; font-size: 12px; color: var(--text-secondary); margin-bottom: 18px; line-height: 1.6; }
    .login-err { background: var(--bg-danger); color: var(--text-danger); border-radius: var(--radius-md); padding: 8px 12px; font-size: 12px; margin-bottom: 12px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: var(--radius-md); font-size: 13px; cursor: pointer; border: 0.5px solid var(--border-med); background: var(--bg-primary); color: var(--text-primary); transition: all .12s; text-decoration: none; font-family: var(--font); }
    .btn:hover { background: var(--bg-secondary); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--bg-info); color: var(--text-info); border-color: #185fa5; }
    .btn-primary:hover { opacity: .88; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-green { background: var(--bg-success); color: var(--text-success); border-color: #c0dd97; }
    .btn-green:hover { background: #c0dd97; }
    .btn-pdf { background: #eeedfe; color: #534ab7; border-color: #cecbf6; }
    .btn-pdf:hover { background: #cecbf6; }
    .btn-danger { background: var(--bg-danger); color: var(--text-danger); border-color: #f7c1c1; }
    .btn-danger:hover { background: #f7c1c1; }
    .btn-insta { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color: #fff; border: none; }
    .btn-insta:hover { opacity: .88; }
    .btn-wa { background: var(--bg-secondary); color: var(--text-secondary); border-color: var(--border); cursor: not-allowed; opacity: .5; }

    /* Forms */
    .form-group { margin-bottom: 13px; }
    .form-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; display: block; font-weight: 500; }
    .form-input { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border-med); border-radius: var(--radius-md); font-size: 13px; color: var(--text-primary); background: var(--bg-primary); font-family: var(--font); transition: border-color .12s; }
    .form-input:focus { outline: none; border-color: #185fa5; box-shadow: 0 0 0 3px rgba(24,95,165,.1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Cards */
    .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 18px; }
    .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 16px; }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
    .stat-value { font-size: 22px; font-weight: 600; color: var(--text-primary); }
    .stat-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: var(--radius-md); font-size: 10px; white-space: nowrap; font-weight: 500; }
    .badge-confirmed { background: var(--bg-success); color: var(--text-success); }
    .badge-pending { background: var(--bg-warning); color: var(--text-warning); }
    .badge-cancelled { background: var(--bg-danger); color: var(--text-danger); }
    .badge-paid { background: var(--bg-success); color: var(--text-success); }
    .badge-overdue { background: var(--bg-danger); color: var(--text-danger); }
    .badge-bootcamp { background: #eeedfe; color: #534ab7; }

    /* Avatars */
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .av-blue  { background: #e6f1fb; color: #185fa5; }
    .av-teal  { background: #e1f5ee; color: #0f6e56; }
    .av-purple{ background: #eeedfe; color: #534ab7; }
    .av-coral { background: #faece7; color: #993c1d; }
    .av-amber { background: #faeeda; color: #854f0b; }

    /* Lists & Rows */
    .pay-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg-primary); transition: background .1s; }
    .pay-row:hover { background: var(--bg-secondary); }

    /* Tabs */
    .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 16px; }
    .tab { padding: 8px 14px; font-size: 13px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .12s; }
    .tab.active { color: var(--text-info); border-bottom-color: #185fa5; font-weight: 600; }

    /* Page header */
    .ph { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
    .pt { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    .ps { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* Client grid */
    .client-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 12px; }
    .client-card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; cursor: pointer; transition: all .12s; }
    .client-card:hover { border-color: var(--border-med); background: var(--bg-secondary); }
    .goal-tag { display: inline-flex; padding: 3px 8px; background: var(--bg-info); color: var(--text-info); border-radius: var(--radius-md); font-size: 11px; margin-top: 6px; }
    .metric-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
    .detail-panel { display: grid; grid-template-columns: 230px 1fr; gap: 18px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
    .modal { background: var(--bg-primary); border-radius: var(--radius-lg); padding: 22px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; border: 0.5px solid var(--border); }
    .modal-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; }

    /* Toast */
    .save-toast { position: fixed; bottom: 24px; right: 20px; background: var(--bg-success); color: var(--text-success); border: 0.5px solid #c0dd97; border-radius: var(--radius-md); padding: 9px 16px; font-size: 12px; z-index: 300; font-weight: 500; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .empty-state { text-align: center; padding: 32px; color: var(--text-secondary); font-size: 13px; }
    .info-banner { background: var(--bg-info); color: var(--text-info); border-radius: var(--radius-md); padding: 8px 12px; font-size: 12px; margin-bottom: 12px; line-height: 1.5; }

    /* Photo upload */
    .photo-slot { background: var(--bg-secondary); border: 1.5px dashed var(--border-med); border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; transition: all .12s; min-height: 200px; }
    .photo-slot:hover { border-color: #185fa5; }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
    .photo-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: .2s; }
    .photo-slot:hover .photo-overlay { opacity: 1; }

    /* ── CALENDAR ───────────────────────────────────────────── */
    .cal-shell { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: visible; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid var(--border); gap: 10px; flex-wrap: wrap; }
    .cal-nav { display: flex; align-items: center; gap: 8px; }
    .cal-nav-btn { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: var(--radius-md); border: 0.5px solid var(--border-med); background: var(--bg-primary); cursor: pointer; font-size: 14px; color: var(--text-primary); }
    .cal-nav-btn:hover { background: var(--bg-secondary); }
    .cal-title { font-size: 14px; font-weight: 500; color: var(--text-primary); min-width: 190px; text-align: center; }
    .cal-vtoggle { display: flex; border: 0.5px solid var(--border-med); border-radius: var(--radius-md); overflow: hidden; }
    .cal-vbtn { padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--text-secondary); background: var(--bg-primary); border: none; border-right: 0.5px solid var(--border); font-family: var(--font); }
    .cal-vbtn:last-child { border-right: none; }
    .cal-vbtn.active { background: var(--bg-info); color: var(--text-info); font-weight: 600; }

    /* Session block */
    .s-block { border-radius: 5px; padding: 4px 8px; font-size: 10px; cursor: pointer; margin-bottom: 3px; border-left: 3px solid #534ab7; background: #eeedfe; color: #534ab7; transition: all .1s; line-height: 1.4; }
    .s-block:hover { background: #cecbf6; }

    /* Tooltip */
    .s-wrap { position: relative; }
    .s-tooltip { display: none; position: absolute; left: 0; top: calc(100% + 4px); z-index: 9999; min-width: 260px; max-width: 340px; background: var(--bg-primary); border: 0.5px solid var(--border-med); border-radius: 10px; padding: 14px; pointer-events: none; box-shadow: 0 6px 24px rgba(0,0,0,.18); }
    .s-wrap:hover .s-tooltip { display: block; }
    .week-col:nth-last-child(1) .s-tooltip,
    .week-col:nth-last-child(2) .s-tooltip { left: auto; right: 0; }
    .month-cell:nth-child(7n) .s-tooltip,
    .month-cell:nth-child(7n-1) .s-tooltip { left: auto; right: 0; }

    /* Daily view */
    .day-scroll { overflow-y: auto; max-height: 440px; }
    .day-grid { display: grid; grid-template-columns: 58px 1fr; }
    .day-hl { font-size: 10px; color: var(--text-secondary); padding: 4px 8px 0 0; height: 58px; display: flex; align-items: flex-start; justify-content: flex-end; border-right: 0.5px solid var(--border); }
    .day-slot { height: 58px; border-bottom: 0.5px solid var(--border); padding: 3px 6px; overflow: visible; }

    /* Weekly view */
    .week-header-grid { display: grid; grid-template-columns: repeat(7,1fr); border-top: 0.5px solid var(--border); }
    .week-col-header { padding: 8px 6px; font-size: 11px; font-weight: 500; color: var(--text-secondary); border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); text-align: center; }
    .week-col-header.tc { color: var(--text-info); background: var(--bg-info); }
    .day-num { font-size: 18px; font-weight: 600; display: block; line-height: 1.2; }
    .week-body-grid { display: grid; grid-template-columns: repeat(7,1fr); overflow: visible; }
    .week-col { border-right: 0.5px solid var(--border); padding: 6px 4px; min-height: 160px; overflow: visible; position: relative; }
    .week-col:last-child { border-right: none; }
    .week-col.tc { background: rgba(24,95,165,.04); }

    /* Monthly view */
    .month-grid { display: grid; grid-template-columns: repeat(7,1fr); overflow: visible; }
    .month-dow { text-align: center; font-size: 10px; font-weight: 600; color: var(--text-secondary); padding: 8px 2px; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); }
    .month-dow:last-child { border-right: none; }
    .month-cell { min-height: 72px; padding: 4px; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); overflow: visible; position: relative; }
    .month-cell:nth-child(7n) { border-right: none; }
    .month-cell.om { background: var(--bg-secondary); }
    .month-cell.tdc { background: rgba(24,95,165,.05); }
    .mdn { font-size: 11px; font-weight: 500; color: var(--text-secondary); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-bottom: 3px; }
    .mdn.tn { background: #185fa5; color: #fff; }
    .mpill { font-size: 9px; border-radius: 3px; padding: 1px 5px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; background: #eeedfe; color: #534ab7; }
    .mmore { font-size: 9px; color: var(--text-secondary); cursor: pointer; }

    /* Mobile nav */
    .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-primary); border-top: 0.5px solid var(--border); padding: 6px 0; z-index: 50; }
    .mob-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 5px 4px; cursor: pointer; font-size: 9px; color: var(--text-secondary); }
    .mob-item.active { color: var(--text-info); }
    .mob-icon { font-size: 17px; }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main-wrap { margin-left: 0; }
      .mobile-nav { display: flex; }
      .main { padding: 14px; padding-bottom: 72px; }
      .stat-grid { grid-template-columns: repeat(2,1fr); }
      .detail-panel { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .client-grid { grid-template-columns: repeat(2,1fr); }
      .ph { flex-direction: column; align-items: flex-start; }
      .storage-bar span:last-child { display: none; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
const {useState,useEffect,useCallback,useRef}=React;

/* ── CONSTANTS ─────────────────────────────────────────── */
const AV=['av-blue','av-teal','av-purple','av-coral','av-amber'];
const getAv=(n,i)=>({c:AV[(i||0)%AV.length],init:n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()});
const fmt=d=>d instanceof Date?d.toISOString().split('T')[0]:d;
const addD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
const today=new Date();
const fmtDate=d=>new Date(d+'T00:00').toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
const fmtMoney=n=>'$'+parseFloat(n).toFixed(2);
const WA_ENABLED=false; // set true to enable WhatsApp links

const GOALS=['Weight Loss','Muscle Gain','Endurance','Flexibility','General Fitness','Athletic Performance'];
const SLOT_TIMES=['06:00','07:00','08:00','09:00','16:00','17:00','18:00','19:00'];
const DEF_NAMES=['Early Birds','Rise & Grind','Morning Power','Peak Performance','Afternoon Burn','Rush Hour Fit','Sunset Sweat','Night Owls'];

const FN=['Emma','Liam','Sophia','Noah','Ava','Ethan','Isabella','Mason','Mia','Logan','Charlotte','Lucas','Amelia','Oliver','Harper','Elijah','Evelyn','Aiden','Abigail','Jackson','Emily','Sebastian','Elizabeth','Mateo','Sofia','Jack','Avery','Owen','Scarlett','Levi','Victoria','Carter','Grace','Wyatt','Chloe','John','Penelope','Henry','Lily','Dylan','Hannah','Ryan','Layla','Grayson','Zoe','Julian','Nora','Isaiah','Riley','Lincoln','Aria','Jaxon','Aurora','Landon','Savannah','Hunter','Paisley','Thomas','Nova','Camden','Stella','Robert','Violet','Adrian','Luna','Connor','Cora','Eli','Madeline','Brody','Ellie','Aaron','Kinsley','Jace','Brooklyn','Jordan','Maya','Angel','Bella','Easton','Willow','Kayden','Clara','Bentley','Quinn','Nolan','Ruby','Ryder','Hadley','Xavier'];
const LN=['Wilson','Chen','Patel','Johnson','Martinez','Brown','Garcia','Davis','Rodriguez','Miller','Moore','Taylor','Anderson','Thomas','Jackson','White','Harris','Martin','Thompson','Lee','Perez','Walker','Hall','Allen','Young','Hernandez','King','Wright','Lopez','Hill','Scott','Green','Adams','Baker','Gonzalez','Nelson','Carter','Mitchell','Roberts','Turner','Phillips','Campbell','Parker','Evans','Edwards','Collins','Stewart','Sanchez','Morris','Rogers','Reed','Cook','Morgan','Bell','Murphy','Bailey','Rivera','Cooper','Richardson','Cox','Howard','Ward','Torres','Peterson','Gray','Ramirez','James','Watson','Brooks','Kelly','Sanders','Price','Bennett','Wood','Barnes','Ross','Henderson','Coleman','Jenkins','Perry','Powell','Long','Patterson','Hughes','Flores','Washington'];

function sr(seed){let s=seed;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/4294967295;};}

function genClients(){
  const r=sr(42);
  return FN.map((fn,i)=>({
    id:i+1, name:fn+' '+LN[i],
    phone:'1416555'+String(1000+i).slice(-4),
    email:fn.toLowerCase()+'.'+LN[i].toLowerCase()+'@email.com',
    age:22+Math.round(r()*30), weight:52+Math.round(r()*48), height:158+Math.round(r()*32),
    goal:GOALS[i%6], notes:'',
    joinDate:fmt(addD(today,-30-Math.round(r()*335))),
    changeReq:null,
  }));
}

function genSessions(clients){
  const ss=Math.ceil(clients.length/8);
  const sc=SLOT_TIMES.map((_,si)=>clients.slice(si*ss,Math.min((si+1)*ss,clients.length)).map(c=>c.id));
  const out=[];let sid=1;
  for(let d=-21;d<=35;d++){
    const date=addD(today,d);const dow=date.getDay();
    if(dow===0||dow===6)continue;
    SLOT_TIMES.forEach((time,si)=>{
      out.push({id:sid++,name:DEF_NAMES[si],clientIds:sc[si],date:fmt(date),time,type:'Bootcamp',status:'confirmed',isGroup:true});
    });
  }
  return out;
}

const INIT_CLIENTS=genClients();
const INIT_SESSIONS=genSessions(INIT_CLIENTS);
const INIT_PAYMENTS=INIT_CLIENTS.slice(0,30).map((cl,i)=>({
  id:i+1, clientId:cl.id, amount:180+Math.round((i%3)*20),
  date:fmt(addD(today,-(i%15))), desc:'Monthly bootcamp — Apr',
  status:i%5===4?'overdue':i%3===2?'pending':'paid',
}));

/* ── localStorage hook ─────────────────────────────────── */
const loadLS=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
function usePS(key,init){
  const [state,setState]=useState(()=>loadLS(key,init));
  const first=useRef(true);
  useEffect(()=>{
    if(first.current){first.current=false;return;}
    try{localStorage.setItem(key,JSON.stringify(state));}catch{}
  },[state,key]);
  return [state,setState];
}

/* ── Progress card generator (Canvas) ─────────────────── */
async function genProgressCard(cl,before,after){
  const c=document.createElement('canvas');c.width=1080;c.height=1080;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#111111';ctx.fillRect(0,0,1080,1080);
  ctx.fillStyle='#ffffff';ctx.font='bold 52px Arial';ctx.textAlign='center';
  ctx.fillText('TRANSFORMATION',540,72);
  ctx.fillStyle='#888888';ctx.font='22px Arial';
  ctx.fillText(cl.name.toUpperCase()+' · '+cl.goal.toUpperCase(),540,108);
  ctx.fillStyle='#534AB7';ctx.fillRect(200,120,680,3);
  const drawImg=(src,x,y,w,h,label)=>new Promise(resolve=>{
    ctx.fillStyle='rgba(0,0,0,0.65)';
    const roundRect=(cx,cy,cw,ch,r)=>{ctx.beginPath();ctx.roundRect(cx,cy,cw,ch,r);};
    if(src){
      const img=new Image();
      img.onload=()=>{ctx.save();roundRect(x,y,w,h,12);ctx.clip();ctx.drawImage(img,x,y,w,h);ctx.restore();resolve();};
      img.onerror=resolve;img.src=src;
    }else{
      ctx.fillStyle='#2a2a2a';roundRect(x,y,w,h,12);ctx.fill();
      ctx.fillStyle='#555';ctx.font='28px Arial';ctx.textAlign='center';
      ctx.fillText('No Photo',x+w/2,y+h/2);resolve();
    }
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(x,y+h-50,w,50);
    ctx.fillStyle='#fff';ctx.font='bold 30px Arial';ctx.textAlign='center';
    ctx.fillText(label,x+w/2,y+h-16);
  });
  await drawImg(before,60,140,460,700,'BEFORE');
  await drawImg(after,560,140,460,700,'AFTER');
  ctx.fillStyle='#ffffff';ctx.font='bold 36px Arial';ctx.textAlign='center';ctx.fillText(cl.name,540,902);
  ctx.fillStyle='#888';ctx.font='22px Arial';ctx.fillText('Goal: '+cl.goal+' · '+new Date().getFullYear(),540,940);
  ctx.fillStyle='#534AB7';ctx.font='bold 20px Arial';ctx.fillText('GymPro · Powered by Your Trainer',540,990);
  return c.toDataURL('image/jpeg',0.92);
}

async function shareCard(dataUrl,name){
  try{
    const blob=await fetch(dataUrl).then(r=>r.blob());
    const file=new File([blob],'transformation.jpg',{type:'image/jpeg'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:name+' Transformation',text:'Amazing transformation! #GymPro #Bootcamp'});
    }else{
      const a=document.createElement('a');a.href=dataUrl;a.download=name.replace(/ /g,'-')+'-transformation.jpg';a.click();
    }
  }catch(err){console.warn('Share:',err);}
}

  const hours=Array.from({length:16},(_,i)=>i+5);

    e('div',{className:'day-grid'},
      hours.flatMap(h=>{
        const label=(h<12?h:h===12?12:h-12)+':00'+(h<12?' am':' pm');

          e('div',{key:'l'+h,className:'day-hl'},label),

/* ── MONTHLY VIEW ──────────────────────────────────────── */
function MonthlyView({refDate,sessions,clients,getSessionName,renameSession}){
  const yr=refDate.getFullYear(),mo=refDate.getMonth();
  const first=new Date(yr,mo,1);
  const offset=(first.getDay()+6)%7;
  const dim=new Date(yr,mo+1,0).getDate();
  const prev=new Date(yr,mo,0).getDate();
  const total=Math.ceil((dim+offset)/7)*7;
  const todayStr=fmt(today);const e=React.createElement;
  const cells=Array.from({length:total},(_,i)=>{
    let d,it=true;
    if(i<offset){d=new Date(yr,mo-1,prev-offset+i+1);it=false;}
    else if(i>=offset+dim){d=new Date(yr,mo+1,i-offset-dim+1);it=false;}
    else d=new Date(yr,mo,i-offset+1);
    return{d,it};
  });
  return e('div',{className:'month-grid'},
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>e('div',{key:d,className:'month-dow'},d)),
    cells.map(({d,it},i)=>{
      const ds=fmt(d);const isT=ds===todayStr;
      const da=sessions.filter(s=>s.date===ds).sort((a,b)=>a.time.localeCompare(b.time));
      const show=da.slice(0,3);const more=da.length-3;
      return e('div',{key:i,className:`month-cell${!it?' om':''}${isT?' tdc':''}`},
        e('div',{className:`mdn${isT?' tn':''}`},d.getDate()),
        show.map(s=>{const name=getSessionName(s);const cnt=s.clientIds.length;

            e('div',{className:'mpill',title:name},name.split(' ')[0]+' '+s.time.slice(0,5)+' ('+cnt+')'),
            e('div',{className:'s-tooltip'},
              e('div',{style:{fontWeight:600,fontSize:12,marginBottom:4}},name+' · '+s.time),
              e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px 10px'}},
                s.clientIds.map(id=>clients.find(c=>c.id===id)).filter(Boolean).map(c=>e('div',{key:c.id,style:{fontSize:11}},c.name))

            )
          );

/* ── PHOTO MANAGER ─────────────────────────────────────── */
function PhotoManager({client,photos,setPhotos,onClose}){
  const ph=photos[client.id]||{before:null,after:null,beforeDate:'',afterDate:''};
  const [loc,setLoc]=useState(ph);
  const [cardUrl,setCardUrl]=useState(null);
  const [generating,setGenerating]=useState(false);
  const e=React.createElement;
  const handleFile=(slot,file)=>{
    const reader=new FileReader();
    reader.onload=ev=>{const upd={...loc,[slot]:ev.target.result,[slot+'Date']:fmt(today)};setLoc(upd);setPhotos(p=>({...p,[client.id]:upd}));};
    reader.readAsDataURL(file);
  };
  const makeCard=async()=>{setGenerating(true);const url=await genProgressCard(client,loc.before,loc.after);setCardUrl(url);setGenerating(false);};

  const PhotoSlot=(slot,label)=>e('div',{style:{textAlign:'center'}},
    e('div',{style:{fontSize:12,fontWeight:600,marginBottom:8,color:'var(--text-secondary)'}},label),
    e('label',{className:'photo-slot',style:{cursor:'pointer',display:'block',height:210}},
      loc[slot]
        ?e('img',{src:loc[slot],alt:label,style:{width:'100%',height:210,objectFit:'cover',borderRadius:'8px'}})
        :e('div',{style:{padding:20,color:'var(--text-secondary)',textAlign:'center',fontSize:12}},e('div',{style:{fontSize:30,marginBottom:8}},'📷'),e('div',null,'Tap to upload'),e('div',{style:{fontSize:10,marginTop:4}},'JPG or PNG')),
      loc[slot]&&e('div',{className:'photo-overlay',style:{borderRadius:'8px'}},e('span',{style:{color:'#fff',fontSize:12}},'Change photo')),
      e('input',{type:'file',accept:'image/*',style:{display:'none'},onChange:ev=>ev.target.files[0]&&handleFile(slot,ev.target.files[0])})
    ),
    loc[slot]&&e('div',{style:{fontSize:10,color:'var(--text-secondary)',marginTop:5}},loc[slot+'Date'])
  );

  return e('div',{className:'modal-overlay',onClick:ev=>ev.target===ev.currentTarget&&onClose()},
    e('div',{className:'modal',style:{maxWidth:560}},
      e('div',{className:'modal-title'},'📸 Progress Photos — '+client.name),
      e('div',{className:'form-row',style:{gap:16,marginBottom:16}},
        PhotoSlot('before','BEFORE'), PhotoSlot('after','AFTER')
      ),
      e('div',{style:{borderTop:'0.5px solid var(--border)',paddingTop:14}},
        e('div',{style:{fontSize:13,fontWeight:600,marginBottom:10}},'Share Progress Card'),
        !cardUrl?e('div',{style:{textAlign:'center',padding:'12px 0'}},
          e('button',{className:'btn btn-primary',onClick:makeCard,disabled:generating},generating?'Generating…':'⚡ Generate Progress Card'),
          e('div',{style:{fontSize:11,color:'var(--text-secondary)',marginTop:6}},'Creates a 1080×1080 shareable image')
        ):
        e('div',null,
          e('img',{src:cardUrl,style:{width:'100%',borderRadius:10,marginBottom:12}}),
          e('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}},
            e('button',{className:'btn btn-insta',onClick:()=>shareCard(cardUrl,client.name)},navigator.share?'📤 Share':'⬇ Download Card'),
            e('a',{className:'btn',href:'https://www.instagram.com/',target:'_blank',rel:'noopener'},'Open Instagram'),
            e('button',{className:'btn btn-sm',onClick:()=>setCardUrl(null)},'Regenerate')
          ),
          e('div',{className:'info-banner'},'Tip: Download the card → open Instagram → tap + → select the downloaded image → share as a post or story.')
        )
      ),
      e('div',{style:{display:'flex',justifyContent:'flex-end',marginTop:14}},e('button',{className:'btn',onClick:onClose},'Close'))
    )
  );
}
