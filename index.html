<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>GymPro — Bootcamp Trainer</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-p:#fff;--bg-s:#f5f5f4;--bg-t:#f0efed;
  --bg-info:#e6f1fb;--bg-ok:#eaf3de;--bg-warn:#faeeda;--bg-err:#fcebeb;
  --tx-p:#1a1a18;--tx-s:#6b6b67;--tx-info:#185fa5;--tx-ok:#3b6d11;--tx-warn:#854f0b;--tx-err:#a32d2d;
  --bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);--r8:8px;--r12:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg-p:#1c1c1a;--bg-s:#252523;--bg-t:#2a2a28;
  --bg-info:#0c2d4a;--bg-ok:#122609;--bg-warn:#3a2204;--bg-err:#3a0d0d;
  --tx-p:#e8e8e4;--tx-s:#9a9a94;--tx-info:#7ab8f5;--tx-ok:#90c95a;--tx-warn:#f0a840;--tx-err:#f09090;
  --bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.2);
}}
body{font-family:var(--font);background:var(--bg-t);color:var(--tx-p);min-height:100vh}
#app{min-height:100vh}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:215px;min-width:215px;background:var(--bg-p);border-right:.5px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:40}
.sb-logo{padding:18px 16px 13px;border-bottom:.5px solid var(--bd)}
.sb-logo h1{font-size:18px;font-weight:600;color:var(--tx-p)}
.sb-logo span{font-size:11px;color:var(--tx-s)}
.sb-sec{font-size:10px;font-weight:600;color:var(--tx-s);text-transform:uppercase;letter-spacing:.07em;padding:10px 16px 4px}
.sb-nav{padding:6px 0;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--tx-s);border-left:3px solid transparent;transition:all .1s}
.nav-item:hover{background:var(--bg-s);color:var(--tx-p)}
.nav-item.active{background:var(--bg-info);color:var(--tx-info);border-left-color:#185fa5}
.nav-badge{margin-left:auto;background:var(--bg-warn);color:var(--tx-warn);border-radius:10px;font-size:10px;padding:1px 6px;font-weight:600}
.sb-foot{border-top:.5px solid var(--bd);padding:5px 0}
.sb-btn{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:12px;color:var(--tx-s)}
.sb-btn:hover{background:var(--bg-s);color:var(--tx-p)}
.main-wrap{margin-left:215px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.sbar{display:flex;align-items:center;gap:8px;padding:6px 22px;background:var(--bg-p);border-bottom:.5px solid var(--bd);font-size:11px;color:var(--tx-s);position:sticky;top:0;z-index:30}
.sdot{width:7px;height:7px;border-radius:50%;background:#3b6d11;flex-shrink:0}
.main{padding:20px 22px;flex:1}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-t)}
.login-card{background:var(--bg-p);border:.5px solid var(--bd);border-radius:var(--r12);padding:34px;width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:28px;font-weight:700;color:var(--tx-p)}
.login-logo p{font-size:13px;color:var(--tx-s);margin-top:4px}
.login-hint{background:var(--bg-s);border-radius:var(--r8);padding:9px 12px;font-size:12px;color:var(--tx-s);margin-bottom:16px;line-height:1.6}
.login-err{background:var(--bg-err);color:var(--tx-err);border-radius:var(--r8);padding:8px 12px;font-size:12px;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r8);font-size:12px;cursor:pointer;border:.5px solid var(--bd2);background:var(--bg-p);color:var(--tx-p);transition:all .1s;text-decoration:none;font-family:var(--font)}
.btn:hover{background:var(--bg-s)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--bg-info);color:var(--tx-info);border-color:#185fa5}.btn-p:hover{opacity:.88}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-ok{background:var(--bg-ok);color:var(--tx-ok);border-color:#c0dd97}.btn-ok:hover{background:#c0dd97}
.btn-pdf{background:#eeedfe;color:#534ab7;border-color:#cecbf6}.btn-pdf:hover{background:#cecbf6}
.btn-err{background:var(--bg-err);color:var(--tx-err);border-color:#f7c1c1}.btn-err:hover{background:#f7c1c1}
.btn-insta{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;border:none}.btn-insta:hover{opacity:.88}
.btn-wa{background:var(--bg-s);color:var(--tx-s);border-color:var(--bd);cursor:not-allowed;opacity:.5}
.fg{margin-bottom:12px}
.fl{font-size:11px;color:var(--tx-s);margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:7px 10px;border:.5px solid var(--bd2);border-radius:var(--r8);font-size:13px;color:var(--tx-p);background:var(--bg-p);font-family:var(--font)}
.fi:focus{outline:none;border-color:#185fa5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:var(--bg-p);border:.5px solid var(--bd);border-radius:var(--r12);padding:14px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg-s);border-radius:var(--r8);padding:13px 15px}
.sl{font-size:11px;color:var(--tx-s);margin-bottom:4px}
.sv{font-size:21px;font-weight:600;color:var(--tx-p)}
.ss{font-size:10px;color:var(--tx-s);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:var(--r8);font-size:10px;white-space:nowrap;font-weight:500}
.badge-ok{background:var(--bg-ok);color:var(--tx-ok)}
.badge-warn{background:var(--bg-warn);color:var(--tx-warn)}
.badge-err{background:var(--bg-err);color:var(--tx-err)}
.badge-info{background:var(--bg-info);color:var(--tx-info)}
.badge-purple{background:#eeedfe;color:#534ab7}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.av-blue{background:#e6f1fb;color:#185fa5}.av-teal{background:#e1f5ee;color:#0f6e56}
.av-purple{background:#eeedfe;color:#534ab7}.av-coral{background:#faece7;color:#993c1d}
.av-amber{background:#faeeda;color:#854f0b}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--bg-p);border-radius:var(--r12);padding:20px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;border:.5px solid var(--bd)}
.modal-lg{max-width:640px}
.modal-title{font-size:15px;font-weight:600;color:var(--tx-p);margin-bottom:14px}
.tabs{display:flex;border-bottom:.5px solid var(--bd);margin-bottom:14px}
.tab{padding:7px 13px;font-size:12px;cursor:pointer;color:var(--tx-s);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .1s}
.tab.active{color:var(--tx-info);border-bottom-color:#185fa5;font-weight:600}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.pt{font-size:19px;font-weight:600;color:var(--tx-p)}
.ps{font-size:12px;color:var(--tx-s);margin-top:2px}
.empty{text-align:center;padding:28px;color:var(--tx-s);font-size:12px}
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.client-card{background:var(--bg-p);border:.5px solid var(--bd);border-radius:var(--r12);padding:13px;cursor:pointer;transition:all .1s}
.client-card:hover{border-color:var(--bd2);background:var(--bg-s)}
.goal-tag{display:inline-flex;padding:2px 7px;background:var(--bg-info);color:var(--tx-info);border-radius:var(--r8);font-size:10px;margin-top:5px}
.metric-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--bd);font-size:12px}
.dp{display:grid;grid-template-columns:220px 1fr;gap:16px}
.pay-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:.5px solid var(--bd);border-radius:var(--r8);background:var(--bg-p)}
.pay-row:hover{background:var(--bg-s)}
.toast{position:fixed;bottom:22px;right:18px;background:var(--bg-ok);color:var(--tx-ok);border:.5px solid #c0dd97;border-radius:var(--r8);padding:8px 14px;font-size:12px;z-index:300;font-weight:500;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.info-banner{background:var(--bg-info);color:var(--tx-info);border-radius:var(--r8);padding:8px 12px;font-size:12px;margin-bottom:12px;line-height:1.5}
/* day picker */
.day-pill{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:.5px solid var(--bd2);font-size:11px;cursor:pointer;transition:all .1s;font-family:var(--font)}
.day-pill:hover{background:var(--bg-s)}
.day-pill.on{background:#534ab7;color:#fff;border-color:#534ab7}
.day-pill.on-blue{background:#185fa5;color:#fff;border-color:#185fa5}
.day-pills{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
.preset-btn{padding:4px 10px;border-radius:20px;border:.5px solid var(--bd2);font-size:11px;cursor:pointer;background:var(--bg-p);color:var(--tx-s);font-family:var(--font)}
.preset-btn:hover,.preset-btn.active{background:var(--bg-info);color:var(--tx-info);border-color:#185fa5}
.freq-badge{display:inline-flex;padding:3px 10px;background:#eeedfe;color:#534ab7;border-radius:20px;font-size:11px;font-weight:600;margin-left:8px}
/* schedule cards */
.sched-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.sched-card{background:var(--bg-p);border:.5px solid var(--bd);border-radius:var(--r12);padding:14px;transition:all .1s}
.sched-card.group{border-left:3px solid #534ab7}
.sched-card.oneone{border-left:3px solid #185fa5}
.sched-card.inactive{opacity:.55}
.sched-name{font-size:14px;font-weight:600;color:var(--tx-p);margin-bottom:3px}
.sched-meta{font-size:11px;color:var(--tx-s);margin-bottom:8px}
/* calendar */
.cal-shell{background:var(--bg-p);border:.5px solid var(--bd);border-radius:var(--r12);overflow:visible}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:.5px solid var(--bd);gap:8px;flex-wrap:wrap}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:var(--r8);border:.5px solid var(--bd2);background:var(--bg-p);cursor:pointer;font-size:13px;color:var(--tx-p)}
.cal-btn:hover{background:var(--bg-s)}
.cal-title{font-size:13px;font-weight:500;color:var(--tx-p);min-width:180px;text-align:center}
.cal-vtoggle{display:flex;border:.5px solid var(--bd2);border-radius:var(--r8);overflow:hidden}
.cal-vbtn{padding:5px 11px;font-size:11px;cursor:pointer;color:var(--tx-s);background:var(--bg-p);border:none;border-right:.5px solid var(--bd);font-family:var(--font)}
.cal-vbtn:last-child{border-right:none}
.cal-vbtn.active{background:var(--bg-info);color:var(--tx-info);font-weight:600}
.cal-week-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.s-block{border-radius:5px;padding:4px 7px;font-size:10px;cursor:pointer;margin-bottom:3px;border-left:3px solid #534ab7;background:#eeedfe;color:#534ab7;transition:all .1s;line-height:1.4}
.s-block.oneone{border-left-color:#185fa5;background:var(--bg-info);color:var(--tx-info)}
.s-block:hover{filter:brightness(.96)}
.s-wrap{position:relative}
.s-tip{display:none;position:absolute;left:0;top:calc(100% + 4px);z-index:9999;min-width:250px;max-width:340px;background:var(--bg-p);border:.5px solid var(--bd2);border-radius:10px;padding:12px;pointer-events:none;box-shadow:0 6px 22px rgba(0,0,0,.16)}
.s-wrap:hover .s-tip{display:block}
.week-col:nth-last-child(1) .s-tip,.week-col:nth-last-child(2) .s-tip{left:auto;right:0}
.month-cell:nth-child(7n) .s-tip,.month-cell:nth-child(7n-1) .s-tip{left:auto;right:0}
.day-scroll{overflow-y:auto;max-height:430px}
.day-grid{display:grid;grid-template-columns:56px 1fr}
.day-hl{font-size:10px;color:var(--tx-s);padding:4px 8px 0 0;height:56px;display:flex;align-items:flex-start;justify-content:flex-end;border-right:.5px solid var(--bd)}
.day-slot{height:56px;border-bottom:.5px solid var(--bd);padding:3px 5px;overflow:visible}
.week-hdr{display:grid;grid-template-columns:repeat(7,1fr);border-top:.5px solid var(--bd)}
.week-col-h{padding:8px 5px;font-size:11px;font-weight:500;color:var(--tx-s);border-right:.5px solid var(--bd);border-bottom:.5px solid var(--bd);text-align:center}
.week-col-h.tc{color:var(--tx-info);background:var(--bg-info)}
.dn{font-size:17px;font-weight:600;display:block;line-height:1.2}
.week-body{display:grid;grid-template-columns:repeat(7,1fr);overflow:visible}
.week-col{border-right:.5px solid var(--bd);padding:5px 4px;min-height:140px;overflow:visible;position:relative}
.week-col:last-child{border-right:none}
.week-col.tc{background:rgba(24,95,165,.04)}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);overflow:visible}
.month-dow{text-align:center;font-size:10px;font-weight:600;color:var(--tx-s);padding:7px 2px;border-bottom:.5px solid var(--bd);border-right:.5px solid var(--bd)}
.month-dow:last-child{border-right:none}
.month-cell{min-height:66px;padding:4px;border-bottom:.5px solid var(--bd);border-right:.5px solid var(--bd);overflow:visible;position:relative}
.month-cell:nth-child(7n){border-right:none}
.month-cell.om{background:var(--bg-s)}
.month-cell.tdc{background:rgba(24,95,165,.04)}
.mdn{font-size:11px;font-weight:500;color:var(--tx-s);width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px}
.mdn.tn{background:#185fa5;color:#fff}
.mpill{font-size:9px;border-radius:3px;padding:1px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;background:#eeedfe;color:#534ab7}
.mpill.oneone{background:var(--bg-info);color:var(--tx-info)}
.mmore{font-size:9px;color:var(--tx-s);cursor:pointer}
.photo-slot{background:var(--bg-s);border:1.5px dashed var(--bd2);border-radius:var(--r12);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:all .1s;min-height:190px}
.photo-slot:hover{border-color:#185fa5}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.photo-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.photo-slot:hover .photo-overlay{opacity:1}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-p);border-top:.5px solid var(--bd);padding:5px 0;z-index:50}
.mob-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;cursor:pointer;font-size:9px;color:var(--tx-s)}
.mob-item.active{color:var(--tx-info)}
.mob-icon{font-size:16px}
/* client selector */
.cl-selector{max-height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;border:.5px solid var(--bd);border-radius:var(--r8);padding:6px;background:var(--bg-p)}
.cl-opt{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:12px}
.cl-opt:hover{background:var(--bg-s)}
.cl-opt.sel{background:var(--bg-info)}
.selected-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;background:var(--bg-s);border:.5px solid var(--bd);border-radius:20px;font-size:11px}
.chip-x{cursor:pointer;color:var(--tx-s);font-size:13px;line-height:1}
.chip-x:hover{color:var(--tx-err)}
/* toggle switch */
.type-toggle{display:flex;border:.5px solid var(--bd2);border-radius:var(--r8);overflow:hidden;margin-bottom:12px}
.type-opt{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:12px;color:var(--tx-s);background:var(--bg-p);border:none;font-family:var(--font);transition:all .1s}
.type-opt.active{background:var(--bg-info);color:var(--tx-info);font-weight:600}
@media(max-width:700px){
  .sidebar{display:none}.main-wrap{margin-left:0}.mob-nav{display:flex}
  .main{padding:12px;padding-bottom:68px}.stat-grid{grid-template-columns:repeat(2,1fr)}
  .dp{grid-template-columns:1fr}.fr{grid-template-columns:1fr}
  .client-grid{grid-template-columns:repeat(2,1fr)}.ph{flex-direction:column;align-items:flex-start}
  .sbar span:last-child{display:none}
  /* calendar mobile */
  .cal-hdr{flex-direction:column;align-items:stretch;padding:10px 12px;gap:10px}
  .cal-nav{justify-content:space-between;width:100%}
  .cal-title{min-width:unset;flex:1;font-size:12px}
  .cal-vtoggle{width:100%}
  .cal-vbtn{flex:1;text-align:center;padding:7px 4px;font-size:12px}
  .week-hdr,.week-body{min-width:560px}
  .month-cell{min-height:50px;padding:3px}
  .month-dow{font-size:9px;padding:5px 1px}
  .mdn{font-size:10px;width:18px;height:18px}
  .mpill{font-size:8px;padding:1px 3px}
  .day-scroll{max-height:60vh}
  .day-grid{grid-template-columns:44px 1fr}
  .day-hl{font-size:9px;padding:3px 5px 0 0}
  .s-tip{display:none!important}
  .cal-shell{overflow:hidden}
  .cal-week-wrap{border-top:.5px solid var(--bd)}
}
  </style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
const {useState,useEffect,useCallback,useRef,useMemo}=React;
const AVC=['av-blue','av-teal','av-purple','av-coral','av-amber'];
const getAv=(n,i)=>({c:AVC[(i||0)%AVC.length],init:n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()});
const fmt=d=>d instanceof Date?d.toISOString().split('T')[0]:d;
const addD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
const today=new Date();
const fmtDate=d=>new Date(d+'T00:00').toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
const fmtMoney=n=>'$'+parseFloat(n).toFixed(2);
const WA_ENABLED=false;
const GOALS=['Weight Loss','Muscle Gain','Endurance','Flexibility','General Fitness','Athletic Performance'];
const CATS=['Bootcamp','Strength','Cardio','Flexibility','HIIT','General Fitness','Rehabilitation'];
const SLOT_TIMES=['06:00','07:00','08:00','09:00','16:00','17:00','18:00','19:00'];
const DEF_NAMES=['Early Birds','Rise & Grind','Morning Power','Peak Performance','Afternoon Burn','Rush Hour Fit','Sunset Sweat','Night Owls'];
const DAYS_LABEL=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const PRESETS=[
  {label:'Weekdays',days:[1,2,3,4,5]},
  {label:'Daily',days:[0,1,2,3,4,5,6]},
  {label:'Mon/Wed/Fri',days:[1,3,5]},
  {label:'Tue/Thu',days:[2,4]},
  {label:'Sat/Sun',days:[0,6]},

/* ── derive sessions from schedules for a date range ─── */
function getSessionsForRange(schedules,customs,startStr,endStr){
  const out=[];
  const s=new Date(startStr+'T00:00'),e=new Date(endStr+'T00:00');
  for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
    const ds=fmt(new Date(d)),dow=d.getDay();
    schedules.filter(sc=>sc.active&&sc.days.includes(dow)&&sc.startDate<=ds).forEach(sc=>{
      out.push({id:`sc-${sc.id}-${ds}`,scheduleId:sc.id,name:sc.name,clientIds:[...sc.clientIds],date:ds,time:sc.time,type:sc.category,status:'confirmed',isGroup:sc.type==='group',is1on1:sc.type==='1on1'});
    });
  }
  (customs||[]).filter(s=>s.date>=startStr&&s.date<=endStr).forEach(s=>out.push(s));
  return out.sort((a,b)=>a.time.localeCompare(b.time));
}

  ctx.fillStyle='#534AB7';ctx.fillRect(200,116,680,3);

    if(src){const img=new Image();img.onload=()=>{ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();ctx.drawImage(img,x,y,w,h);ctx.restore();res()};img.onerror=res;img.src=src}
